# ~/.config/kitty/kitty.conf

# --- Shell --------------------------------------------------------------
# Pin fish explicitly so we don't depend on SHELL env var or login session
shell /usr/bin/fish --login --interactive

# --- Font ---------------------------------------------------------------
# "Mono" variant = strict monospace, correct double-width for Nerd icons
font_family       JetBrainsMono Nerd Font Mono
bold_font         JetBrainsMono Nerd Font Mono Bold
italic_font       JetBrainsMono Nerd Font Mono Italic
bold_italic_font  JetBrainsMono Nerd Font Mono Bold Italic
font_size 12.0

# --- Behavior -----------------------------------------------------------
scrollback_lines 50000
enable_audio_bell no
copy_on_select yes
cursor_blink_interval 0
mouse_hide_wait 1.5
confirm_os_window_close 0

# --- Window -------------------------------------------------------------
window_padding_width 6
hide_window_decorations no

# --- Transparency (background only — text stays fully opaque/crisp) ------
background_opacity 1.0
dynamic_background_opacity no

# --- Colors (vibrant dark + cyan accent) --------------------------------
include theme.conf
