# ==========================================================================
# Hyprland — BOOTSTRAP config (Ubuntu 26.04, Hyprland 0.53.3)
# Goal: a clean, usable FIRST login. We'll integrate your Arch reference
# configs + ricing on top of this later, piece by piece.
# Based on the shipped 0.53.3 example so the syntax matches your version.
# Wiki: https://wiki.hypr.land/Configuring/
# ==========================================================================


################
### MONITORS ###
################
# Auto-detect; we'll pin resolution/scale/position later if needed.
monitor=eDP-1,highrr,0x0,1.25    # laptop (left): best mode panel offers
# any external monitor: highest-refresh mode (native res @ max Hz), placed right, auto scale
monitor=,highrr,auto,auto


#############
### COLORS ##
#############
# matugen-generated cyan palette (regenerated from wallpaper). Provides
# $primary, $surface, $on_surface, $primary_container, etc.
source = ~/.config/hypr/colors.conf


###############
### ECOSYSTEM #
###############
# Stops the "hyprland-qtutils not installed" nag (it's only needed for the
# update-news / donation Qt popups, which we disable here).
ecosystem {
    no_update_news = true
    no_donation_nag = true
}


###################
### MY PROGRAMS ###
###################
$terminal    = kitty
$fileManager = nautilus
$menu        = rofi -show drun


#################
### AUTOSTART ###
#################
# These make the first boot actually usable (bar, notifications, auth
# prompts, wifi tray). Without them you'd land on a bare compositor.
exec-once = waybar                          # status bar (our cyan ML4W-style config)
exec-once = swaybg -i ~/.config/hypr/.current_wallpaper -m fill   # wallpaper (hyprpaper rendered blank here)
exec-once = mako                            # notification daemon
exec-once = /usr/libexec/hyprpolkitagent    # GUI password/auth prompts (sudo, polkit)
exec-once = wl-paste --watch cliphist store # clipboard history daemon
exec-once = hypridle                        # idle: auto-lock / screen-off / suspend
# nm-applet removed — the waybar network module is now the single wifi/ethernet indicator
# Clipboard manager (cliphist) and wallpaper (hyprpaper) come in the rice pass.


#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
# Make Electron apps (VS Code, etc.) run natively on Wayland -> crisp on fractional scale
env = ELECTRON_OZONE_PLATFORM_HINT,auto


#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 2
    gaps_out = 0, 2, 2, 2   # top, right, bottom, left — top flush under waybar
    border_size = 1
    col.active_border = $primary $primary_container 45deg
    col.inactive_border = $outline_variant
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 6
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = false
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0    # no built-in mascot; swaybg draws the wallpaper
    disable_hyprland_logo = true
}

# XWayland (X11) apps can't do fractional scaling, so at scale 1.25 the
# compositor upscales them => blurry. force_zero_scaling makes them render at
# native resolution (sharp); each XWayland app then sizes itself via its own
# scale flag (e.g. Spotify: --force-device-scale-factor=1.25). Most apps run
# native Wayland and are unaffected.
xwayland {
    force_zero_scaling = true
}


#############
### INPUT ###
#############
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1       # focus-follows-mouse (matches your Hyprland-style preference)
    sensitivity = 0
    natural_scroll = false # mouse wheel: traditional direction (touchpad stays natural below)

    touchpad {
        natural_scroll = true    # matches the mouse (natural/inverted direction)
    }
}

gesture = 3, horizontal, workspace


###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

# --- core ---
bind = $mainMod, RETURN, exec, $terminal      # your muscle-memory: Super+Enter = terminal
bind = $mainMod, Q, exec, $terminal           # Hyprland-default alias for terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, SPACE, exec, $menu           # app launcher (wofi) — matches your GNOME Super+Space
bind = $mainMod, D, exec, $menu               # alias
bind = $mainMod, P, pseudo,                   # dwindle
bind = $mainMod, T, togglesplit,              # dwindle (moved off J to free it for vim focus)

# --- screenshots (grim + slurp) ---
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh region        # region select -> file + clipboard
bind = $mainMod, Print, exec, ~/.config/hypr/scripts/screenshot.sh full  # whole screen -> file + clipboard

# --- move focus (arrows + vim hjkl) ---
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

# --- move window within layout ---
bind = $mainMod SHIFT, H, movewindow, l   # left
bind = $mainMod SHIFT, J, movewindow, d   # down
bind = $mainMod ALT, K, movewindow, u     # up    (Super+Shift+K is monitor-move)
bind = $mainMod ALT, L, movewindow, r     # right (Super+Shift+L is monitor-move)

# --- move active WORKSPACE to another monitor (Super+Shift+L/K) ---
# moves the whole workspace (all its windows) + focus, not just the active tile
bind = $mainMod SHIFT, L, movecurrentworkspacetomonitor, HDMI-A-1   # workspace -> external screen
bind = $mainMod SHIFT, K, movecurrentworkspacetomonitor, eDP-1      # workspace -> laptop screen

# --- wallpaper switcher (rofi picker + matugen recolor) ---
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpaper.sh

# --- clipboard history / lock / power menu ---
bind = $mainMod SHIFT, V, exec, ~/.config/hypr/scripts/cliphist.sh   # clipboard history
bind = $mainMod CTRL, L, exec, hyprlock                              # lock screen
bind = $mainMod, Escape, exec, wlogout -b 5                          # power menu

# --- workspaces ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# --- move window to workspace ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# --- scratchpad ---
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# --- scroll through workspaces ---
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# --- move/resize with mouse ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- volume / brightness (wpctl + brightnessctl, both installed) ---
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# --- media keys (require playerctl — NOT installed yet, no-op until rice pass) ---
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


##############################
### WINDOWS AND WORKSPACES ###
##############################
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# Float settings/utility dialogs (bar click targets) instead of tiling them
windowrule {
    name = float-settings
    match:class = ^(blueman-manager|org\.pulseaudio\.pavucontrol|org\.gnome\.Settings|nm-connection-editor|pavucontrol)$
    float = true
}

# VS Code: fully opaque (was 0.85/0.75) — kept sharp, blur disabled globally.
windowrule {
    name = vscode-transparency
    match:class = ^(code)$
    opacity = 1.0 1.0
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}
