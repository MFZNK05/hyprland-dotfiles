# hyprlock — lock screen. Background follows the current wallpaper via symlink.
background {
    monitor =
    path = ~/.config/hypr/.current_wallpaper
    blur_passes = 3
    blur_size = 7
    brightness = 0.55
    contrast = 0.9
}

general {
    hide_cursor = true
}

# Password input
input-field {
    monitor =
    size = 320, 56
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(255, 158, 100, 0.9)
    inner_color = rgba(26, 17, 16, 0.85)
    font_color = rgb(241, 222, 220)
    placeholder_text = <i>Password</i>
    fail_text = <i>Wrong password</i>
    fade_on_empty = false
    rounding = 14
    position = 0, -40
    halign = center
    valign = center
}

# Clock
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    font_size = 96
    font_family = Ubuntu Bold
    color = rgba(241, 222, 220, 0.95)
    position = 0, 220
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    font_size = 22
    font_family = Ubuntu
    color = rgba(241, 222, 220, 0.85)
    position = 0, 120
    halign = center
    valign = center
}

# User
label {
    monitor =
    text = $USER
    font_size = 16
    font_family = Ubuntu
    color = rgba(241, 222, 220, 0.8)
    position = 0, 60
    halign = center
    valign = center
}
