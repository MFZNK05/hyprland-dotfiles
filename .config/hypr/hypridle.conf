# hypridle — idle management: lock, screen-off, suspend.
general {
    lock_cmd = pidof hyprlock || hyprlock     # avoid stacking lock instances
    before_sleep_cmd = loginctl lock-session   # lock before sleeping
    after_sleep_cmd = hyprctl dispatch dpms on  # turn screen back on after wake
    ignore_dbus_inhibit = false
}

# Lock after 5 min idle
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# Screen off after 6 min
listener {
    timeout = 360
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 15 min
listener {
    timeout = 900
    on-timeout = systemctl suspend
}
